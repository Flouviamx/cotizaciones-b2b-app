# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "ce91a8d52d49e78d171750e5228a33a1"
application_url = "https://cotizaciones-b2b-app.vercel.app"
embedded = true
name = "Flouvia Cotizaciones B2B"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
# Scopes mínimos: solo lo que la app usa.
#   read_products      → query de productos/variantes (app.quotes._index) + resourcePicker
#   write_draft_orders → las cotizaciones SON draft orders
#   write_customers    → customerCreate al crear cotización desde la tienda (create.tsx)
#   read_companies     → Empresas B2B (app.empresas)
scopes = "read_products,write_draft_orders,write_customers,read_companies"

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

  [webhooks.privacy_compliance]
  customer_data_request_url = "/webhooks/customers/data_request"
  customer_deletion_url = "/webhooks/customers/redact"
  shop_deletion_url = "/webhooks/shop/redact"

[app_proxy]
url = "https://cotizaciones-b2b-app.vercel.app"
subpath = "flouvia-cotizaciones"
prefix = "apps"

[auth]
redirect_urls = [ "https://cotizaciones-b2b-app.vercel.app/api/auth" ]

[build]
# false para que `shopify app dev` NO sobrescriba la URL de producción (Vercel)
# con el túnel temporal. Si necesitas probar el storefront con túnel, ponlo true
# temporalmente y vuélvelo a false antes de desplegar.
automatically_update_urls_on_dev = false
